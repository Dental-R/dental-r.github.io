<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="PNQfpHB3NhkVnnRr3gbYsVX59Gj5MIEO8wshQldLuY8" />
<title>Dental-R｜歯科×AIの無料ツール</title>
<meta name="description" content="歯科医院向けの無料ツールを公開しています。こども はみがきタイマー、治療計画書ツールなど。インストール不要・データ非保存。">
<style>
  :root{--main:#177f8c;--main-dark:#0e5e68;--text:#26383e;--line:#d7e0e3;--bg:#f0f4f5;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Noto Sans JP","Yu Gothic UI","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;
    color:var(--text);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;border-radius:16px;box-shadow:0 8px 28px rgba(14,94,104,.12);
    padding:36px 32px;max-width:520px;width:100%;}
  h1{font-size:1.5rem;color:var(--main-dark);margin-bottom:6px;}
  .sub{font-size:.9rem;color:#7c96a0;margin-bottom:24px;}
  a.tool{display:block;border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;
    margin-bottom:12px;text-decoration:none;color:var(--text);transition:.15s;}
  a.tool:hover{border-color:var(--main);}
  a.tool b{color:var(--main-dark);}
  a.tool span{display:block;font-size:.82rem;color:#7c96a0;margin-top:2px;}
  .foot{font-size:.78rem;color:#9cb4bb;margin-top:20px;text-align:center;}
  .foot a{color:var(--main-dark);}
</style>
</head>
<body>
  <main class="card">
    <h1>🦷 Dental-R</h1>
    <p class="sub">歯科 × AI ｜ 歯科医院向けの無料ツールを公開しています（インストール不要・データ非保存）</p>
    <a class="tool" href="https://dental-r.github.io/kodomo-hamigaki-timer/">
      <b>こども はみがきタイマー</b>
      <span>2分間を6エリアでご案内。院内・小児指導用</span>
    </a>
    <a class="tool" href="https://dental-r.github.io/chiryo-keikakusho-free/">
      <b>治療計画書ツール（無料版）</b>
      <span>歯をタップして色分け、そのまま印刷</span>
    </a>
    <p class="foot">
      紹介記事：<a href="https://note.com/honest_shrew1134/n/n12cdaf0a3bfa">治療計画書ツールについて</a> ／
      <a href="https://note.com/honest_shrew1134/n/n194068539056">開発ストーリー</a><br>
      最新情報は <a href="https://note.com/honest_shrew1134">note</a> で公開中
    </p>
  </main>
</body>
</html>
